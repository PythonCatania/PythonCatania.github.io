<header
  class="sticky top-0 z-[100] border-b border-[var(--border)] bg-[color-mix(in_srgb,var(--bg)_85%,transparent)] backdrop-blur-md"
>
  <nav class="flex min-h-[var(--nav-height)] items-center justify-center px-4">
    <!-- Desktop: logo + links centered -->
    <ul class="hidden list-none items-center gap-1 p-0 sm:flex">
      <li class="flex list-none items-center">
        <a href="#pycatania" class="flex items-center px-3 py-[0.4rem] text-inherit no-underline" aria-label="Python Catania home">
          <img
            ngSrc="/images/pythoncatania.svg"
            alt="Python Catania"
            height="36"
            width="36"
            priority
            class="block"
          />
        </a>
      </li>
      <li class="flex list-none items-center">
        <a href="#pycatania" class="rounded-[var(--radius)] px-3 py-[0.4rem] text-inherit no-underline transition-colors duration-150 hover:bg-[var(--surface)]">PyCatania</a>
      </li>
      <li class="flex list-none items-center">
        <a href="#meetup" class="rounded-[var(--radius)] px-3 py-[0.4rem] text-inherit no-underline transition-colors duration-150 hover:bg-[var(--surface)]">Meetup</a>
      </li>
      <li class="flex list-none items-center">
        <a href="#contact" class="rounded-[var(--radius)] px-3 py-[0.4rem] text-inherit no-underline transition-colors duration-150 hover:bg-[var(--surface)]">Contacts</a>
      </li>
    </ul>

    <!-- Mobile: logo + hamburger -->
    <ul class="flex w-full list-none items-center justify-between p-0 sm:hidden">
      <li class="flex list-none items-center">
        <a href="#pycatania" class="flex items-center px-3 py-[0.4rem] text-inherit no-underline" aria-label="Python Catania home">
          <img
            ngSrc="/images/pythoncatania.svg"
            alt="Python Catania"
            height="36"
            width="36"
            priority
            class="block"
          />
        </a>
      </li>
      <li class="flex list-none items-center">
        <details class="relative">
          <summary
            class="cursor-pointer list-none px-2 py-1 text-[1.4rem] [&::-webkit-details-marker]:hidden"
            aria-label="Menu"
          >&#9776;</summary>
          <ul class="absolute right-0 top-[calc(100%+0.25rem)] z-10 m-0 min-w-40 list-none rounded-[var(--radius)] border border-[var(--border)] bg-[var(--bg)] p-1 shadow-[0_4px_16px_rgba(0,0,0,0.15)]">
            <li class="block">
              <a href="#pycatania" class="block rounded-[calc(var(--radius)-2px)] px-3 py-2 text-inherit no-underline hover:bg-[var(--surface)]">PyCatania</a>
            </li>
            <li class="block">
              <a href="#meetup" class="block rounded-[calc(var(--radius)-2px)] px-3 py-2 text-inherit no-underline hover:bg-[var(--surface)]">Meetup</a>
            </li>
            <li class="block">
              <a href="#contact" class="block rounded-[calc(var(--radius)-2px)] px-3 py-2 text-inherit no-underline hover:bg-[var(--surface)]">Contacts</a>
            </li>
          </ul>
        </details>
      </li>
    </ul>
  </nav>
</header>
