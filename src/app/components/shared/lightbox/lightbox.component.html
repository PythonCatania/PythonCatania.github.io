@if (index() !== null) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/85"
    role="dialog"
    aria-modal="true"
    (click)="close()"
  >
    <!-- Close button -->
    <button
      type="button"
      class="absolute top-4 right-4 flex h-10 w-10 cursor-pointer items-center justify-center rounded-full bg-white/10 text-2xl text-white transition-colors hover:bg-white/25"
      aria-label="Close"
      (click)="close()"
    >
      ✕
    </button>

    <!-- Prev arrow -->
    <button
      type="button"
      class="absolute left-4 flex h-12 w-12 cursor-pointer items-center justify-center rounded-full bg-white/10 text-2xl text-white transition-colors hover:bg-white/25"
      aria-label="Previous photo"
      (click)="$event.stopPropagation(); prev()"
    >
      ‹
    </button>

    <!-- Image -->
    <div
      class="mx-20 flex max-h-[90vh] max-w-[90vw] items-center justify-center"
      (click)="$event.stopPropagation()"
    >
      <img
        [src]="baseUrl() + images()[index()!]"
        [alt]="'Photo ' + (index()! + 1) + ' of ' + images().length"
        class="max-h-[90vh] max-w-[90vw] rounded-(--radius) object-contain shadow-2xl"
      />
    </div>

    <!-- Next arrow -->
    <button
      type="button"
      class="absolute right-4 flex h-12 w-12 cursor-pointer items-center justify-center rounded-full bg-white/10 text-2xl text-white transition-colors hover:bg-white/25"
      aria-label="Next photo"
      (click)="$event.stopPropagation(); next()"
    >
      ›
    </button>

    <!-- Counter -->
    <div class="absolute bottom-4 text-sm text-white/70">
      {{ index()! + 1 }} / {{ images().length }}
    </div>
  </div>
}
