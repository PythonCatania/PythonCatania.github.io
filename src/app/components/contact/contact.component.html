<section id="contact" class="bg-(--surface) px-4 py-16 text-center">
  <h2>{{ 'contact.title' | transloco }}</h2>

  <!-- CHAT + CODE side by side -->
  <div class="mt-8 flex flex-wrap justify-center gap-8">
    <app-contact-group [title]="'contact.groups.chat' | transloco">
      <app-contact-button
        id="telegram"
        rel="me noopener"
        href="https://t.me/pythoncatania"
        ariaLabel="Telegram"
        variant="telegram"
      >
        <app-icon-telegram />Telegram
      </app-contact-button>
    </app-contact-group>

    <app-contact-group [title]="'contact.groups.code' | transloco">
      <app-contact-button id="github" rel="me noopener" href="https://github.com/PythonCatania" ariaLabel="GitHub">
        <app-icon-github />GitHub
      </app-contact-button>
    </app-contact-group>
  </div>

  <!-- SOCIAL horizontal row -->
  <div class="mt-8 flex flex-col items-center gap-3">
    <h3 class="text-[0.85rem] tracking-[0.08em] text-(--color-muted) uppercase">
      {{ 'contact.groups.social' | transloco }}
    </h3>
    <div class="flex flex-wrap justify-center gap-3">
      <app-contact-button
        id="facebook"
        rel="me noopener"
        href="https://www.facebook.com/PythonCatania"
        ariaLabel="Facebook"
        variant="secondary"
      >
        <app-icon-facebook />Facebook
      </app-contact-button>
      <app-contact-button
        id="linkedin"
        rel="me noopener"
        href="https://www.linkedin.com/groups/9895708/"
        ariaLabel="LinkedIn"
        variant="secondary"
      >
        <app-icon-linkedin />LinkedIn
      </app-contact-button>
      <app-contact-button
        id="youtube"
        rel="me noopener"
        href="https://www.youtube.com/@pythoncatania"
        ariaLabel="YouTube"
        variant="secondary"
      >
        <app-icon-youtube />YouTube
      </app-contact-button>
      <app-contact-button
        id="instagram"
        rel="me noopener"
        href="https://www.instagram.com/pythoncatania/"
        ariaLabel="Instagram"
        variant="secondary"
      >
        <app-icon-instagram />Instagram
      </app-contact-button>
      <app-contact-button
        id="mastodon"
        rel="me noopener"
        href="https://social.python.it/@pycatania"
        ariaLabel="Mastodon"
        variant="secondary"
      >
        <app-icon-mastodon />Mastodon
      </app-contact-button>
    </div>
  </div>
</section>
